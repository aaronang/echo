name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project Echo.xcodeproj \
            -scheme Echo \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Ad-hoc sign
        run: codesign --deep --force --sign - build/Build/Products/Release/Echo.app

      - name: Package artifact
        run: |
          cd build/Build/Products/Release
          ditto -c -k --keepParent Echo.app Echo.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Echo-${{ github.sha }}
          path: build/Build/Products/Release/Echo.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            build/Build/Products/Release/Echo.zip \
            --title "${{ github.ref_name }}" \
            --generate-notes
