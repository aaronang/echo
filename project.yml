name: Echo
options:
  bundleIdPrefix: com.echo
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"
packages:
  SwiftNIO:
    url: https://github.com/apple/swift-nio
    from: "2.65.0"
targets:
  Echo:
    type: application
    platform: macOS
    sources:
      - Echo
    dependencies:
      - package: SwiftNIO
        product: NIOCore
      - package: SwiftNIO
        product: NIOPosix
      - package: SwiftNIO
        product: NIOHTTP1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.echo.app
        PRODUCT_NAME: Echo
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_KEY_LSUIElement: false
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: "Echo"
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: false
        ENABLE_HARDENED_RUNTIME: true
